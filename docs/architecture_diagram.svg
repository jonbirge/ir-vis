<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="Arial, sans-serif">
  <!-- Title -->
  <text x="700" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#2c3e50">
    IR-to-Color Translation Network Architecture
  </text>
  
  <!-- Input Images -->
  <g id="inputs">
    <!-- IR Input -->
    <rect x="50" y="80" width="120" height="120" fill="#95a5a6" stroke="#34495e" stroke-width="2"/>
    <text x="110" y="150" font-size="14" text-anchor="middle" fill="#fff" font-weight="bold">IR Image</text>
    <text x="110" y="170" font-size="11" text-anchor="middle" fill="#fff">Grayscale</text>
    <text x="110" y="185" font-size="10" text-anchor="middle" fill="#ecf0f1">256×256×3</text>
    
    <!-- Reference Input -->
    <rect x="50" y="250" width="120" height="120" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
    <text x="110" y="310" font-size="14" text-anchor="middle" fill="#fff" font-weight="bold">Reference</text>
    <text x="110" y="330" font-size="11" text-anchor="middle" fill="#fff">Color Image</text>
    <text x="110" y="345" font-size="10" text-anchor="middle" fill="#ecf0f1">256×256×3</text>
  </g>
  
  <!-- Content Encoder (IR path) -->
  <g id="content-encoder">
    <text x="300" y="105" font-size="13" font-weight="bold" fill="#34495e">Content Encoder</text>
    <text x="300" y="122" font-size="10" fill="#7f8c8d">(ResNet-34)</text>
    
    <!-- Encoder blocks -->
    <rect x="250" y="135" width="100" height="45" rx="5" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <text x="300" y="155" font-size="10" text-anchor="middle" fill="#fff">Conv1 + Pool</text>
    <text x="300" y="170" font-size="9" text-anchor="middle" fill="#ecf0f1">128×128×64</text>
    
    <rect x="250" y="195" width="100" height="40" rx="5" fill="#e67e22" stroke="#d35400" stroke-width="2"/>
    <text x="300" y="212" font-size="10" text-anchor="middle" fill="#fff">Layer 1</text>
    <text x="300" y="225" font-size="9" text-anchor="middle" fill="#ecf0f1">64×64×64</text>
    
    <rect x="250" y="250" width="100" height="40" rx="5" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
    <text x="300" y="267" font-size="10" text-anchor="middle" fill="#fff">Layer 2</text>
    <text x="300" y="280" font-size="9" text-anchor="middle" fill="#ecf0f1">32×32×128</text>
    
    <rect x="250" y="305" width="100" height="40" rx="5" fill="#f1c40f" stroke="#f39c12" stroke-width="2"/>
    <text x="300" y="322" font-size="10" text-anchor="middle" fill="#fff">Layer 3</text>
    <text x="300" y="335" font-size="9" text-anchor="middle" fill="#ecf0f1">16×16×256</text>
    
    <rect x="250" y="360" width="100" height="40" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
    <text x="300" y="377" font-size="10" text-anchor="middle" fill="#fff">Layer 4</text>
    <text x="300" y="390" font-size="9" text-anchor="middle" fill="#ecf0f1">8×8×512</text>
  </g>
  
  <!-- Reference Encoder -->
  <g id="reference-encoder">
    <text x="300" y="445" font-size="13" font-weight="bold" fill="#2980b9">Reference Encoder</text>
    <text x="300" y="462" font-size="10" fill="#7f8c8d">(ResNet-34)</text>
    
    <rect x="250" y="475" width="100" height="50" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
    <text x="300" y="495" font-size="10" text-anchor="middle" fill="#fff">ResNet Blocks</text>
    <text x="300" y="508" font-size="9" text-anchor="middle" fill="#ecf0f1">↓</text>
    <text x="300" y="517" font-size="9" text-anchor="middle" fill="#ecf0f1">8×8×512</text>
  </g>
  
  <!-- Cross-Attention Module -->
  <g id="cross-attention">
    <rect x="480" y="310" width="200" height="140" rx="8" fill="#9b59b6" stroke="#8e44ad" stroke-width="3"/>
    <text x="580" y="335" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">Feature Matching</text>
    <text x="580" y="352" font-size="11" text-anchor="middle" fill="#ecf0f1">(Cross-Attention)</text>
    
    <!-- Attention details -->
    <text x="580" y="375" font-size="10" text-anchor="middle" fill="#fff">Q: IR features</text>
    <text x="580" y="392" font-size="10" text-anchor="middle" fill="#fff">K,V: Ref features</text>
    <text x="580" y="410" font-size="10" text-anchor="middle" fill="#fff">8 attention heads</text>
    <text x="580" y="430" font-size="9" text-anchor="middle" fill="#ecf0f1">Output: 8×8×512</text>
  </g>
  
  <!-- Decoder -->
  <g id="decoder">
    <text x="900" y="105" font-size="13" font-weight="bold" fill="#16a085">Decoder (U-Net style)</text>
    
    <!-- Decoder blocks -->
    <rect x="850" y="135" width="100" height="45" rx="5" fill="#1abc9c" stroke="#16a085" stroke-width="2"/>
    <text x="900" y="152" font-size="10" text-anchor="middle" fill="#fff">Up Block 1</text>
    <text x="900" y="165" font-size="9" text-anchor="middle" fill="#ecf0f1">16×16×256</text>
    <text x="900" y="175" font-size="8" text-anchor="middle" fill="#ecf0f1">+ skip</text>
    
    <rect x="850" y="195" width="100" height="45" rx="5" fill="#1abc9c" stroke="#16a085" stroke-width="2"/>
    <text x="900" y="212" font-size="10" text-anchor="middle" fill="#fff">Up Block 2</text>
    <text x="900" y="225" font-size="9" text-anchor="middle" fill="#ecf0f1">32×32×128</text>
    <text x="900" y="235" font-size="8" text-anchor="middle" fill="#ecf0f1">+ skip</text>
    
    <rect x="850" y="255" width="100" height="45" rx="5" fill="#1abc9c" stroke="#16a085" stroke-width="2"/>
    <text x="900" y="272" font-size="10" text-anchor="middle" fill="#fff">Up Block 3</text>
    <text x="900" y="285" font-size="9" text-anchor="middle" fill="#ecf0f1">64×64×64</text>
    <text x="900" y="295" font-size="8" text-anchor="middle" fill="#ecf0f1">+ skip</text>
    
    <rect x="850" y="315" width="100" height="45" rx="5" fill="#1abc9c" stroke="#16a085" stroke-width="2"/>
    <text x="900" y="332" font-size="10" text-anchor="middle" fill="#fff">Up Block 4</text>
    <text x="900" y="345" font-size="9" text-anchor="middle" fill="#ecf0f1">128×128×64</text>
    <text x="900" y="355" font-size="8" text-anchor="middle" fill="#ecf0f1">+ skip</text>
    
    <rect x="850" y="375" width="100" height="45" rx="5" fill="#16a085" stroke="#138d75" stroke-width="2"/>
    <text x="900" y="392" font-size="10" text-anchor="middle" fill="#fff">Output Conv</text>
    <text x="900" y="405" font-size="9" text-anchor="middle" fill="#ecf0f1">256×256×3</text>
    <text x="900" y="415" font-size="8" text-anchor="middle" fill="#ecf0f1">Tanh</text>
  </g>
  
  <!-- Output -->
  <g id="output">
    <rect x="1130" y="250" width="120" height="120" rx="5" fill="#27ae60" stroke="#229954" stroke-width="3"/>
    <text x="1190" y="305" font-size="14" text-anchor="middle" fill="#fff" font-weight="bold">Colorized</text>
    <text x="1190" y="325" font-size="11" text-anchor="middle" fill="#fff">Output</text>
    <text x="1190" y="345" font-size="10" text-anchor="middle" fill="#ecf0f1">256×256×3</text>
  </g>
  
  <!-- Arrows and connections -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#34495e"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#9b59b6"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#16a085"/>
    </marker>
  </defs>
  
  <!-- IR to Content Encoder -->
  <line x1="170" y1="140" x2="245" y2="157" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Reference to Reference Encoder -->
  <line x1="170" y1="310" x2="245" y2="500" stroke="#2980b9" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Content Encoder to Cross-Attention -->
  <path d="M 350 380 L 420 380 L 475 350" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead-purple)" fill="none"/>
  
  <!-- Reference Encoder to Cross-Attention -->
  <path d="M 350 500 L 420 500 L 475 410" stroke="#2980b9" stroke-width="2" marker-end="url(#arrowhead-purple)" fill="none"/>
  
  <!-- Cross-Attention to Decoder -->
  <path d="M 680 380 L 750 380 L 845 157" stroke="#9b59b6" stroke-width="2" marker-end="url(#arrowhead-green)" fill="none"/>
  
  <!-- Skip connections -->
  <path d="M 350 325 Q 600 250 845 277" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,5" fill="none" opacity="0.6"/>
  <path d="M 350 270 Q 600 220 845 217" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="5,5" fill="none" opacity="0.6"/>
  <path d="M 350 215 Q 600 180 845 337" stroke="#f1c40f" stroke-width="1.5" stroke-dasharray="5,5" fill="none" opacity="0.6"/>
  <path d="M 350 157 Q 600 140 845 157" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="5,5" fill="none" opacity="0.6"/>
  
  <!-- Decoder to Output -->
  <line x1="950" y1="397" x2="1125" y2="310" stroke="#16a085" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  
  <!-- Legend for skip connections -->
  <g id="legend">
    <text x="50" y="570" font-size="12" font-weight="bold" fill="#34495e">Legend:</text>
    <line x1="50" y1="590" x2="100" y2="590" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,5"/>
    <text x="110" y="595" font-size="10" fill="#34495e">Skip connections (U-Net)</text>
    
    <line x1="50" y1="610" x2="100" y2="610" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="110" y="615" font-size="10" fill="#34495e">Forward pass</text>
  </g>
  
  <!-- Key features -->
  <g id="features">
    <text x="50" y="660" font-size="12" font-weight="bold" fill="#34495e">Key Features:</text>
    <text x="50" y="680" font-size="10" fill="#34495e">• Dual encoders: Separate processing for IR and reference</text>
    <text x="50" y="700" font-size="10" fill="#34495e">• Cross-attention: Aligns features across viewpoints</text>
    <text x="50" y="720" font-size="10" fill="#34495e">• Skip connections: Preserves fine structural details</text>
    <text x="50" y="740" font-size="10" fill="#34495e">• Multi-head attention: 8 heads capture diverse correspondences</text>
  </g>
  
  <!-- Information flow annotation -->
  <g id="annotations">
    <text x="400" y="275" font-size="9" fill="#7f8c8d" font-style="italic">Structural features</text>
    <text x="400" y="540" font-size="9" fill="#7f8c8d" font-style="italic">Color/style features</text>
    <text x="720" y="350" font-size="9" fill="#ecf0f1" font-style="italic">Attention</text>
    <text x="720" y="365" font-size="9" fill="#ecf0f1" font-style="italic">alignment</text>
    <text x="1000" y="310" font-size="9" fill="#7f8c8d" font-style="italic">Progressive upsampling</text>
  </g>
  
  <!-- Training details -->
  <g id="training-info">
    <rect x="900" y="600" width="450" height="180" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/>
    <text x="1125" y="625" font-size="13" font-weight="bold" text-anchor="middle" fill="#2c3e50">Training Configuration</text>
    
    <text x="920" y="650" font-size="10" fill="#34495e">Loss Components:</text>
    <text x="930" y="670" font-size="9" fill="#7f8c8d">• L1 Loss (pixel-wise): weight = 1.0</text>
    <text x="930" y="685" font-size="9" fill="#7f8c8d">• Perceptual Loss (VGG): weight = 0.5</text>
    <text x="930" y="700" font-size="9" fill="#7f8c8d">• Style Loss (Gram matrix): weight = 10.0</text>
    <text x="930" y="715" font-size="9" fill="#7f8c8d">• Histogram Loss: weight = 0.1</text>
    
    <text x="920" y="740" font-size="10" fill="#34495e">Optimizer: AdamW (lr=1e-4, weight decay=1e-5)</text>
    <text x="920" y="755" font-size="10" fill="#34495e">Scheduler: Cosine annealing</text>
    <text x="920" y="770" font-size="10" fill="#34495e">Gradient clipping: max_norm = 0.5</text>
  </g>
  
  <!-- Dimensions flow -->
  <text x="700" y="870" font-size="10" text-anchor="middle" fill="#7f8c8d" font-style="italic">
    Spatial resolution: 256² → 128² → 64² → 32² → 16² → 8² → 16² → 32² → 64² → 128² → 256²
  </text>
</svg>
